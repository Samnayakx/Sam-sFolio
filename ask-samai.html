<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask SamAI | Sambit Nayak</title>
  <meta name="description" content="Ask SamAI, a prototype digital replica sidebar for Sambit Nayak's portfolio.">
  <link rel="stylesheet" href="site-pages.css">
  <script>try{var t=localStorage.getItem('portfolio-theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}</script>
</head>
<body>
  <header class="topbar">
    <nav class="shell nav" aria-label="Primary navigation">
      <a class="brand" href="portfolio.html#top" aria-label="Home">
        <img class="brand-logo" src="Images/logo-chrome.png" alt="" aria-hidden="true">
      </a>
      <div class="nav-links">
        <a href="portfolio.html#work">Work</a>
        <a href="about.html">About</a>
        <a href="playground.html">Playground</a>
        <a href="https://drive.google.com/file/d/1CUZk1JslQwJWhfeSKr6Z7OB_T4CPGpf5/view" target="_blank" rel="noopener noreferrer">Resume</a>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle colour theme">
          <svg class="theme-icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>
          <svg class="theme-icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
      <button class="ask-sam-btn" type="button" data-samai-open aria-label="Open SamAI">Ask Sam</button>
    </nav>
  </header>

  <main class="shell page">
    <section class="page-hero" aria-labelledby="samai-title">
      <div>
        <p class="page-kicker">Ask SamAI</p>
        <h1 class="page-title" id="samai-title">SamAI lives in the sidebar.</h1>
        <p class="page-lede">Use the SamAI pill in the top navigation to open the Atlas-style right sidebar. This route stays available as a direct launcher.</p>
        <p><button class="btn-pill" type="button" data-samai-open>Open SamAI</button></p>
      </div>
      <aside class="glass-panel portrait-panel">
        <p class="micro-label">Mode</p>
        <div class="signal-grid">
          <div class="signal"><strong>UI</strong><span>Sidebar prototype</span></div>
          <div class="signal"><strong>API</strong><span>Connect later</span></div>
          <div class="signal"><strong>Chat</strong><span>Dummy replies</span></div>
          <div class="signal"><strong>Sam</strong><span>Portfolio context</span></div>
        </div>
      </aside>
    </section>
  </main>
  <script src="theme-toggle.js"></script>
  <script src="samai-sidebar.js"></script>
  <script src="site-pages.js"></script>
  <script>
    if (window.openSamAI) window.openSamAI();
  </script>
</body>
</html>
